<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Delivery Control Tower</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        #map { height: 600px; border-radius: 12px; }
        .glass-card { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-slate-900 font-sans text-slate-200">

    <div class="container mx-auto p-6">
        <header class="flex justify-between items-center mb-8">
            <div>
                <h1 class="text-3xl font-bold text-sky-400">Delivery Zone Authorization Engine  <span class="text-slate-500 text-lg font-normal">v3.0</span></h1>
                <p class="text-slate-400">Zone Authorization Engine & Spatial AI</p>
            </div>
            <div class="flex gap-4">
                <div class="bg-slate-800 p-3 rounded-lg border border-slate-700">
                    <span class="text-xs uppercase text-slate-500 block">Status Serveur</span>
                    <span class="text-green-400 font-mono">● OPERATIONAL</span>
                </div>
            </div>
        </header>

        <div class="grid grid-cols-1 lg:grid-cols-4 gap-6">
            <div class="lg:col-span-1 space-y-6">
                <div class="bg-slate-800 p-5 rounded-xl border border-slate-700">
                    <h3 class="text-sm font-semibold text-slate-400 mb-4 uppercase">Anomaly Alerts</h3>
                    <div id="anomaly-count" class="text-5xl font-bold text-rose-500">0</div>
                    <p class="text-xs text-slate-500 mt-2">Delivery drivers outside city limit</p>
                </div>
                
                <div class="bg-slate-800 p-5 rounded-xl border border-slate-700">
                    <h3 class="text-sm font-semibold text-slate-400 mb-2 uppercase">Legend</h3>
                    <ul class="space-y-2 text-sm">
                        <li class="flex items-center gap-2"><span class="w-3 h-3 bg-green-500 rounded-full"></span> Delivery Zone</li>
                        <li class="flex items-center gap-2"><span class="w-3 h-3 bg-red-500 rounded-full"></span> Nairobi Boundary</li>
                    </ul>
                </div>
            </div>

            <div class="lg:col-span-3">
                <div class="bg-slate-800 p-2 rounded-2xl border border-slate-700 shadow-2xl">
                    <div id="map"></div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script>
        // Initializing the map on Nairobi
        const map = L.map('map').setView([-1.286389, 36.817223], 11);

        // Adding a dark basemap
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
            attribution: '© OpenStreetMap'
        }).addTo(map);

        // 1. add zones from GeoJSON endpoint
        fetch('/zones/geojson')
            .then(res => res.json())
            .then(data => {
                L.geoJSON(data, {
                    style: function(feature) {
                        return {
                            color: feature.properties.category === 'city_boundary' ? '#f43f5e' : '#10b981',
                            fillOpacity: 0.2,
                            weight: 2,
                            dashArray: feature.properties.category === 'city_boundary' ? '5, 10' : '0'
                        };
                    },
                    onEachFeature: function(feature, layer) {
                        layer.bindPopup(`<b>${feature.properties.name}</b><br>Type: ${feature.properties.category}`);
                    }
                }).addTo(map);
            });

        // 2. add anomaly markers
        fetch('/drivers/anomalies')
            .then(res => res.json())
            .then(drivers => {
                document.getElementById('anomaly-count').innerText = drivers.length;
                drivers.forEach(d => {
                    L.circleMarker([d.position.lat, d.position.lon], {
                        radius: 8,
                        fillColor: "#fbbf24",
                        color: "#000",
                        weight: 1,
                        opacity: 1,
                        fillOpacity: 0.8
                    }).addTo(map)
                    .bindTooltip(`REBELLE: ID ${d.driver_id}`, {permanent: false});
                });
            });
    </script>
</body>
</html>
